<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英単語フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0e1117;
  --surface: #1a2236;
  --accent: #f0c060;
  --blue: #5b8dee;
  --green: #3ecf8e;
  --red: #f06060;
  --text: #e8eaf0;
  --muted: #6b7590;
  --border: rgba(255,255,255,0.08);
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

#app {
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr auto auto;
  max-width: 440px;
  margin: 0 auto;
  padding: 12px 14px 10px;
  gap: 8px;
}

/* ヘッダー */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--accent);
}
.header-right { display: flex; align-items: center; gap: 8px; }
.pill {
  font-size: 0.72rem;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
}
.pill.on { color: var(--accent); border-color: var(--accent); background: rgba(240,192,96,0.1); }
.count { font-size: 0.78rem; color: var(--muted); }
.count b { color: var(--text); }

/* プログレスバー */
.prog-wrap { height: 3px; background: var(--border); border-radius: 4px; overflow: hidden; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--blue), var(--accent)); border-radius: 4px; transition: width .4s; }

/* カードエリア */
.scene {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 20px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 7px;
  position: relative;
  cursor: pointer;
}

.card-section {
  font-size: 0.62rem;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  align-self: flex-start;
}
.card-word {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 9vw, 2.5rem);
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.1;
}
.card-pron {
  font-family: 'Fira Code', monospace;
  font-size: 0.78rem;
  color: var(--blue);
}
.pos-badge {
  font-size: 0.62rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  letter-spacing: .05em;
}
.pos-動詞  { background: rgba(62,207,142,.15); color: var(--green); border: 1px solid rgba(62,207,142,.3); }
.pos-名詞  { background: rgba(91,141,238,.15); color: var(--blue);  border: 1px solid rgba(91,141,238,.3); }
.pos-形容詞{ background: rgba(240,192,96,.15); color: var(--accent); border: 1px solid rgba(240,192,96,.3); }
.pos-副詞  { background: rgba(240,96,96,.15);  color: var(--red);   border: 1px solid rgba(240,96,96,.3); }
.pos-前置詞{ background: rgba(180,96,240,.15); color: #c060f0;      border: 1px solid rgba(180,96,240,.3); }

.hint {
  font-size: 0.65rem;
  color: var(--muted);
  opacity: .6;
  margin-top: 2px;
}
.divider { width: 100%; height: 1px; background: var(--border); }

/* 裏面（初期非表示） */
.back { display: none; width: 100%; flex-direction: column; align-items: center; gap: 7px; }
.show-back .back { display: flex; }
.show-back .hint { display: none; }

.meaning {
  font-size: clamp(0.95rem, 4.5vw, 1.2rem);
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  line-height: 1.4;
}
.ex-en {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  font-style: italic;
}
.ex-en b { color: var(--blue); font-style: normal; font-weight: 500; }
.ex-ja {
  font-size: 0.68rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
  opacity: .8;
}

/* 統計行 */
.stats { display: flex; gap: 6px; }
.stat {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px 8px;
  text-align: center;
}
.stat-n { font-size: 1rem; font-weight: 700; line-height: 1; }
.g { color: var(--green); }
.r { color: var(--red); }
.b { color: var(--blue); }
.stat-l { font-size: 0.58rem; color: var(--muted); margin-top: 2px; }

/* ボタン行 */
.actions { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 13px 8px;
  border: none;
  border-radius: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
.btn:active { opacity: .7; transform: scale(.96); }
.btn-bad  { background: rgba(240,96,96,.12);  border: 1.5px solid rgba(240,96,96,.35);  color: var(--red); }
.btn-good { background: rgba(62,207,142,.12); border: 1.5px solid rgba(62,207,142,.35); color: var(--green); }
.btn-skip { flex: 0 0 44px; background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); font-size: 1rem; }

/* 完了画面 */
#done {
  display: none;
  position: fixed; inset: 0; z-index: 99;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 28px 24px;
  text-align: center;
}
#done.show { display: flex; }
.done-icon { font-size: 3rem; }
.done-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--accent); }
.done-sub { font-size: 0.83rem; color: var(--muted); line-height: 1.7; }
.done-stats { display: flex; gap: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 28px; }
.ds { text-align: center; }
.ds-n { font-size: 1.5rem; font-weight: 700; }
.ds-l { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
.btn-main {
  background: linear-gradient(135deg, var(--blue), var(--accent));
  color: #0e1117; border: none;
  padding: 13px 32px; border-radius: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.9rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
}
.btn-sub {
  background: transparent; color: var(--red);
  border: 1.5px solid rgba(240,96,96,.4);
  padding: 11px 24px; border-radius: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.83rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">Vocab Flash</div>
    <div class="header-right">
      <div class="pill" id="pill-all">全て</div>
      <div class="pill" id="pill-unknown">未習得</div>
      <div class="count"><b id="cur">1</b> / <b id="tot">1</b></div>
    </div>
  </div>

  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

  <div class="scene">
    <div class="card" id="card" onclick="void(0)">
      <div class="card-section" id="c-sec"></div>
      <div class="card-word"    id="c-word"></div>
      <div class="card-pron"   id="c-pron"></div>
      <div class="pos-badge"   id="c-pos"></div>
      <div class="hint">タップして答えを見る 👆</div>

      <div class="back">
        <div class="divider"></div>
        <div class="meaning" id="c-meaning"></div>
        <div class="divider"></div>
        <div class="ex-en" id="c-ex-en"></div>
        <div class="ex-ja" id="c-ex-ja"></div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n g" id="s-good">0</div><div class="stat-l">✓ 覚えた</div></div>
    <div class="stat"><div class="stat-n r" id="s-bad">0</div><div class="stat-l">✗ もう一度</div></div>
    <div class="stat"><div class="stat-n b" id="s-left">0</div><div class="stat-l">残り</div></div>
  </div>

  <div class="actions">
    <button class="btn btn-bad"  id="btn-bad">✗ もう一度</button>
    <button class="btn btn-skip" id="btn-skip">→</button>
    <button class="btn btn-good" id="btn-good">✓ 覚えた</button>
  </div>
</div>

<div id="done">
  <div class="done-icon">🎉</div>
  <div class="done-title">セット完了！</div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-stats">
    <div class="ds"><div class="ds-n g" id="d-good">0</div><div class="ds-l">覚えた</div></div>
    <div class="ds"><div class="ds-n r" id="d-bad">0</div><div class="ds-l">もう一度</div></div>
  </div>
  <button class="btn-main" id="btn-restart">🔄 最初からやり直す</button>
  <button class="btn-sub"  id="btn-retry" style="display:none"></button>
</div>

<script>
const VOCAB = [
  {no:1,word:"create",pron:"[kriéit]",pos:"動詞",meaning:"を創り出す；創造、制作",exEn:"Technological change will <b>create</b> new ways of living.",exJa:"技術の変化は新たな生活様式を創り出す。",sec:"Section 1"},
  {no:2,word:"increase",pron:"[inkrís]",pos:"動詞",meaning:"増加する；を増やす",exEn:"Japan's real GDP <b>increased</b> by 1.9 percent last year.",exJa:"日本の実質GDPは昨年1.9パーセント増加した。",sec:"Section 1"},
  {no:3,word:"improve",pron:"[imprúv]",pos:"動詞",meaning:"を向上させる；よくなる",exEn:"Light exercise <b>improves</b> thinking ability.",exJa:"軽い運動は思考力を向上させる。",sec:"Section 1"},
  {no:4,word:"mean",pron:"[míːn]",pos:"動詞",meaning:"を意味する",exEn:"Her silence <b>means</b> that she does not agree with you.",exJa:"彼女の沈黙は同意していないことを意味する。",sec:"Section 1"},
  {no:5,word:"own",pron:"[óun]",pos:"動詞",meaning:"を所有している；自分の",exEn:"A millionaire from China <b>owns</b> this hotel.",exJa:"中国の富豪がこのホテルを所有している。",sec:"Section 1"},
  {no:6,word:"include",pron:"[inklúːd]",pos:"動詞",meaning:"を含む",exEn:"Jane's work <b>includes</b> typing letters and making appointments.",exJa:"ジェーンの仕事は手紙をタイプしたりアポを取ることを含む。",sec:"Section 1"},
  {no:7,word:"consider",pron:"[kənsídər]",pos:"動詞",meaning:"を見なす；について考える",exEn:"She <b>considers</b> herself to be lucky.",exJa:"彼女は自分自身を幸運だと見なしている。",sec:"Section 1"},
  {no:8,word:"allow",pron:"[əláu]",pos:"動詞",meaning:"を許す；…するのを許す",exEn:"The company <b>allows</b> its employees to take long winter vacations.",exJa:"その会社は従業員が長い冬休みを取るのを許している。",sec:"Section 1"},
  {no:9,word:"suggest",pron:"[səgdʒést]",pos:"動詞",meaning:"を提案する",exEn:"The teacher <b>suggested</b> that he study physics in university.",exJa:"先生は彼が大学で物理学を学ぶことを提案した。",sec:"Section 1"},
  {no:10,word:"produce",pron:"[prədjúːs]",pos:"動詞",meaning:"を生産する；を取り出す",exEn:"The manufacturer <b>produces</b> home electrical appliances.",exJa:"その製造業者は家庭用電化製品を生産している。",sec:"Section 1"},
  {no:11,word:"decide",pron:"[disáid]",pos:"動詞",meaning:"を決める；決定する",exEn:"She has <b>decided</b> to memorize ten English words a day.",exJa:"彼女は1日に10個の英単語を覚えることに決めた。",sec:"Section 1"},
  {no:12,word:"offer",pron:"[ɔ́fər]",pos:"動詞",meaning:"を提供する；申し出る",exEn:"Uncle George <b>offered</b> me an opportunity to work for his company.",exJa:"ジョージおじさんは会社で働く機会を提供した。",sec:"Section 1"},
  {no:13,word:"require",pron:"[rikwáiər]",pos:"動詞",meaning:"を要求する；必要とする",exEn:"The Road Traffic Law <b>requires</b> you to wear a seat belt.",exJa:"道路交通法はシートベルトの着用を要求する。",sec:"Section 1"},
  {no:14,word:"share",pron:"[ʃéər]",pos:"動詞",meaning:"を共有する；を分担する",exEn:"I <b>share</b> my office space with other people.",exJa:"私はほかの人々と事務所スペースを共用している。",sec:"Section 1"},
  {no:15,word:"store",pron:"[stɔːr]",pos:"動詞",meaning:"を保存する；蓄積",exEn:"You should <b>store</b> backups of data on the Internet regularly.",exJa:"定期的にデータのバックアップを保存するべきだ。",sec:"Section 1"},
  {no:16,word:"tend",pron:"[ténd]",pos:"動詞",meaning:"傾向がある",exEn:"My town <b>tends</b> to get windy.",exJa:"私の町は風がよく吹く傾向がある。",sec:"Section 1"},
  {no:17,word:"concern",pron:"[kənsə́rn]",pos:"動詞",meaning:"心配している；に関連する",exEn:"We are <b>concerned</b> about the negative effect of the new tax law.",exJa:"私たちは新しい税法のマイナス効果を心配している。",sec:"Section 1"},
  {no:18,word:"describe",pron:"[diskráib]",pos:"動詞",meaning:"について述べる；を説明する",exEn:"She <b>described</b> her physical condition to her doctor.",exJa:"彼女は医師に自分の体調を説明した。",sec:"Section 1"},
  {no:19,word:"involve",pron:"[invɔ́lv]",pos:"動詞",meaning:"を関与させる；を伴う",exEn:"In Japan, more and more men are <b>involved</b> in raising children.",exJa:"日本では、子育てにかかわる男性が増えつつある。",sec:"Section 1"},
  {no:20,word:"reduce",pron:"[ridjúːs]",pos:"動詞",meaning:"を減らす；減少する",exEn:"Good eating habits can <b>reduce</b> the risk of heart disease.",exJa:"よい食習慣は心臓病の危険を減らし得る。",sec:"Section 1"},
  {no:21,word:"design",pron:"[dizáin]",pos:"動詞",meaning:"を設計する；計画する",exEn:"Airbags are <b>designed</b> to protect average-sized adult males.",exJa:"エアバッグは平均的な成人男性を保護するように設計されている。",sec:"Section 1"},
  {no:22,word:"force",pron:"[fɔːrs]",pos:"動詞",meaning:"に強いる；力",exEn:"The scandal <b>forced</b> the CEO to resign from his position.",exJa:"そのスキャンダルはCEOに辞任を強制した。",sec:"Section 1"},
  {no:23,word:"limit",pron:"[límit]",pos:"動詞",meaning:"を制限する；制限",exEn:"\"Tweets\" were originally <b>limited</b> to 140 characters.",exJa:"「ツイート」はもとは140文字までに限られていた。",sec:"Section 1"},
  {no:24,word:"bear",pron:"[béər]",pos:"動詞",meaning:"は耐える；(心に)抱く",exEn:"The man could not <b>bear</b> his stomachache.",exJa:"その男性は胃痛に耐えることができなかった。",sec:"Section 1"},
  {no:25,word:"affect",pron:"[əfékt]",pos:"動詞",meaning:"に影響を及ぼす；感動させる",exEn:"Your language can <b>affect</b> your way of thinking.",exJa:"言語は考え方に影響を及ぼす可能性がある。",sec:"Section 1"},
  {no:26,word:"deal",pron:"[díːl]",pos:"動詞",meaning:"を処理する；取引する",exEn:"Our team <b>deals</b> with complaints from our customers.",exJa:"我がチームは顧客からの苦情を処理する。",sec:"Section 1"},
  {no:27,word:"avoid",pron:"[əvɔ́id]",pos:"動詞",meaning:"を避ける",exEn:"She somehow <b>avoided</b> getting involved in the quarrel.",exJa:"彼女はどうにか口論に巻き込まれるのを避けた。",sec:"Section 1"},
  {no:28,word:"relate",pron:"[riléit]",pos:"動詞",meaning:"を関連づける；関連している",exEn:"She believes that blood types are <b>related</b> to personalities.",exJa:"彼女は血液型は性格に関連していると信じている。",sec:"Section 1"},
  {no:29,word:"realize",pron:"[ríːəlaiz]",pos:"動詞",meaning:"に気づく；を実現する",exEn:"She <b>realized</b> that she was put in a difficult position.",exJa:"彼女は自分が難しい立場に置かれていることに気づいた。",sec:"Section 1"},
  {no:30,word:"encourage",pron:"[inkə́ridʒ]",pos:"動詞",meaning:"を奨励する；を励ます",exEn:"Many companies <b>encourage</b> their employees not to work overtime.",exJa:"多くの会社は残業をしないよう奨励している。",sec:"Section 1"},
  {no:31,word:"compare",pron:"[kəmpéər]",pos:"動詞",meaning:"を比較する",exEn:"She <b>compared</b> the Japanese economy with the U.S. economy.",exJa:"彼女は日本経済をアメリカ経済と比較した。",sec:"Section 1"},
  {no:32,word:"measure",pron:"[méʒər]",pos:"動詞",meaning:"を測る；評価する",exEn:"She <b>measures</b> her temperature every morning.",exJa:"彼女は毎朝体温を測る。",sec:"Section 1"},
  {no:33,word:"exist",pron:"[igzíst]",pos:"動詞",meaning:"存在する；生存する",exEn:"Some linguists think about 8,000 languages <b>exist</b> in the world.",exJa:"世界に約8,000の言語が存在すると考える言語学者がいる。",sec:"Section 1"},
  {no:34,word:"challenge",pron:"[tʃǽlindʒ]",pos:"動詞",meaning:"に異議を唱える；挑戦",exEn:"He <b>challenged</b> the common belief that laughter is a unique human feature.",exJa:"彼は笑いが人間独自の特徴であるという常識に挑戦した。",sec:"Section 1"},
  {no:35,word:"depend",pron:"[dipénd]",pos:"動詞",meaning:"頼る；次第である",exEn:"Children <b>depend</b> on their parents for many things.",exJa:"子供は多くのことを親に依存している。",sec:"Section 1"},
  {no:36,word:"idea",pron:"[aidíːə]",pos:"名詞",meaning:"考え、思いつき；概念",exEn:"He came up with a good <b>idea</b> for the school party.",exJa:"彼は学校のパーティーに関する良い考えを思いついた。",sec:"Section 1"},
  {no:37,word:"cause",pron:"[kɔ́ːz]",pos:"名詞",meaning:"原因；を引き起こす",exEn:"Air pollution is a major <b>cause</b> of health problems.",exJa:"大気汚染は健康問題の主要な原因である。",sec:"Section 1"},
  {no:38,word:"effect",pron:"[ifékt]",pos:"名詞",meaning:"効果；結果",exEn:"Abnormal weather can have a negative <b>effect</b> on people's lives.",exJa:"異常気象は人々の生活に悪影響を与えかねない。",sec:"Section 1"},
  {no:39,word:"influence",pron:"[ínfluəns]",pos:"名詞",meaning:"影響(力)",exEn:"Exercising has an important <b>influence</b> on one's health.",exJa:"運動することは人の健康に重大な影響を与える。",sec:"Section 1"},
  {no:40,word:"environment",pron:"[invάirənmənt]",pos:"名詞",meaning:"環境；自然環境",exEn:"Recycling is an effective way to help the <b>environment</b>.",exJa:"リサイクルは自然環境を助けるための効果的な方法である。",sec:"Section 1"},
  {no:41,word:"skill",pron:"[skíl]",pos:"名詞",meaning:"技能；熟練",exEn:"She needs to improve her cooking <b>skills</b> to become a chef.",exJa:"彼女は料理師になるために技能を向上させる必要がある。",sec:"Section 1"},
  {no:42,word:"value",pron:"[vǽljuː]",pos:"名詞",meaning:"価値；評価する",exEn:"Many societies place a high <b>value</b> on education these days.",exJa:"最近、多くの社会は教育に高い価値を置く。",sec:"Section 1"},
  {no:43,word:"knowledge",pron:"[nɔ́lidʒ]",pos:"名詞",meaning:"知識；認識",exEn:"Most young adults have a good <b>knowledge</b> of computers.",exJa:"最近の若者の大半はコンピューターに関する豊富な知識を持っている。",sec:"Section 1"},
  {no:44,word:"practice",pron:"[prǽktis]",pos:"名詞",meaning:"実践；(社会の)慣習",exEn:"The manager decided to put his new ideas into <b>practice</b>.",exJa:"部長は自分の新しいアイデアを実行することに決めた。",sec:"Section 1"},

let deck=[], idx=0, goodSet=new Set(), badSet=new Set(), filter='all';

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function buildDeck(){
  deck = filter==='unknown' && badSet.size>0
    ? shuffle(VOCAB.filter(v=>badSet.has(v.no)))
    : shuffle([...VOCAB]);
  idx=0; goodSet.clear(); badSet.clear();
}
function setFilter(f){
  filter=f;
  document.getElementById('pill-all').classList.toggle('on',f==='all');
  document.getElementById('pill-unknown').classList.toggle('on',f==='unknown');
}
function render(){
  const v=deck[idx];
  document.getElementById('card').classList.remove('show-back');
  document.getElementById('c-sec').textContent=v.sec;
  document.getElementById('c-word').textContent=v.word;
  document.getElementById('c-pron').textContent=v.pron;
  const pb=document.getElementById('c-pos');
  pb.textContent=v.pos; pb.className='pos-badge pos-'+v.pos;
  document.getElementById('c-meaning').textContent=v.meaning;
  document.getElementById('c-ex-en').innerHTML=v.exEn;
  document.getElementById('c-ex-ja').textContent=v.exJa;
  const done=goodSet.size+badSet.size, total=deck.length;
  document.getElementById('prog').style.width=(done/total*100)+'%';
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('tot').textContent=total;
  document.getElementById('s-good').textContent=goodSet.size;
  document.getElementById('s-bad').textContent=badSet.size;
  document.getElementById('s-left').textContent=total-done;
}
function flip(){ document.getElementById('card').classList.toggle('show-back'); }
function next(good){
  const v=deck[idx];
  good?goodSet.add(v.no):badSet.add(v.no);
  idx++;
  if(idx>=deck.length){showDone();return;}
  render();
}
function answer(good){
  const card=document.getElementById('card');
  if(!card.classList.contains('show-back')){card.classList.add('show-back');return;}
  next(good);
}
function showDone(){
  document.getElementById('d-good').textContent=goodSet.size;
  document.getElementById('d-bad').textContent=badSet.size;
  const pct=Math.round(goodSet.size/deck.length*100);
  document.getElementById('done-sub').textContent=`全 ${deck.length} 語完了！正解率 ${pct}%`;
  const rb=document.getElementById('btn-retry');
  if(badSet.size>0){rb.style.display='block';rb.textContent=`✗ 未習得 ${badSet.size}語 を復習する`;}
  else{rb.style.display='none';}
  document.getElementById('done').classList.add('show');
}
function restart(unknownOnly){
  document.getElementById('done').classList.remove('show');
  if(unknownOnly){
    const nos=[...badSet];
    deck=shuffle(VOCAB.filter(v=>nos.includes(v.no)));
    idx=0;goodSet.clear();badSet.clear();
  }else{buildDeck();}
  render();
}

window.addEventListener('load', function(){
  // カードタップ
  document.getElementById('card').addEventListener('click', flip);

  // ボタン（stopPropagationでカードのclickと分離）
  document.getElementById('btn-bad').addEventListener('click', function(e){e.stopPropagation();answer(false);});
  document.getElementById('btn-good').addEventListener('click', function(e){e.stopPropagation();answer(true);});
  document.getElementById('btn-skip').addEventListener('click', function(e){e.stopPropagation();next(false);});
  document.getElementById('pill-all').addEventListener('click', function(){setFilter('all');});
  document.getElementById('pill-unknown').addEventListener('click', function(){setFilter('unknown');});
  document.getElementById('btn-restart').addEventListener('click', function(){restart(false);});
  document.getElementById('btn-retry').addEventListener('click', function(){restart(true);});

  buildDeck();
  render();
});
</script>
