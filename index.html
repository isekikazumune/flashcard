<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocab Flash 1500</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--surface:#161d2b;--surface2:#1e2740;
  --accent:#e8b84b;--blue:#5b8dee;--green:#3ecf8e;--red:#f06060;
  --text:#e6eaf3;--muted:#6b7a99;--border:rgba(255,255,255,0.08);
  --card-shadow:0 4px 24px rgba(0,0,0,.4);--fs-base:1rem;
}
[data-theme="light"]{
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#e8eaf0;
  --accent:#c8902a;--blue:#2c5fcf;--green:#1da870;--red:#d94040;
  --text:#1a1f2e;--muted:#6b7a99;--border:rgba(0,0,0,0.10);
  --card-shadow:0 4px 24px rgba(0,0,0,.12);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;overflow:hidden;font-size:var(--fs-base);transition:background .25s,color .25s}
.screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg)}
.screen.active{display:flex}

/* ── ホーム ── */
#home{padding:14px;gap:10px;overflow-y:auto}
.top-bar{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:"Playfair Display",serif;font-size:1.4rem;color:var(--accent);letter-spacing:.04em}
.logo-sub{font-size:.65rem;color:var(--muted);margin-top:2px}
.top-controls{display:flex;gap:6px;align-items:center}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--muted);transition:all .2s}
.icon-btn:active{opacity:.7}
.icon-btn.on{border-color:var(--accent);color:var(--accent)}
.fs-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:10px}
.fs-panel.hidden{display:none}
.fs-label{font-size:.68rem;color:var(--muted);white-space:nowrap}
.fs-btns{display:flex;gap:4px}
.fs-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:"Noto Sans JP",sans-serif;color:var(--muted);font-size:.78rem}
.fs-btn.on{background:rgba(232,184,75,.15);border-color:var(--accent);color:var(--accent);font-weight:700}
.stats-banner{display:flex;gap:7px}
.sstat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px;text-align:center}
.sstat-n{font-size:1.25rem;font-weight:700}
.sstat-n.gold{color:var(--accent)}.sstat-n.green{color:var(--green)}.sstat-n.red{color:var(--red)}.sstat-n.blue{color:var(--blue)}
.sstat-l{font-size:.58rem;color:var(--muted);margin-top:2px}
.section-label{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sec-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-family:"Noto Sans JP",sans-serif;font-size:.72rem;padding:7px 2px;border-radius:10px;cursor:pointer;position:relative;transition:all .15s}
.sec-btn.on{background:rgba(232,184,75,.12);border-color:var(--accent);color:var(--accent);font-weight:700}
.sec-btn:active{opacity:.7}
.sec-btn .badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;background:var(--green);border-radius:50%;font-size:.55rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.sec-btn .badge.hidden{display:none}
.sec-btn .prog-pip{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:70%;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.sec-btn .prog-pip-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}
.range-row{display:flex;gap:8px;align-items:center}
.range-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:"Fira Code",monospace;font-size:.88rem;padding:8px 10px;border-radius:8px;text-align:center;-webkit-appearance:none;appearance:none}
.range-input:focus{outline:none;border-color:var(--accent)}
.range-sep{color:var(--muted);font-size:.78rem}

/* ── モード選択 ── */
.mode-label{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.mode-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.mode-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-family:"Noto Sans JP",sans-serif;font-size:.75rem;padding:9px 6px;border-radius:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.mode-btn .mode-icon{font-size:1.3rem}
.mode-btn .mode-name{font-size:.72rem;font-weight:700}
.mode-btn .mode-desc{font-size:.58rem;color:var(--muted);text-align:center}
.mode-btn.on{background:rgba(91,141,238,.12);border-color:var(--blue);color:var(--blue)}
.mode-btn.on .mode-desc{color:var(--blue);opacity:.7}
.mode-btn:active{opacity:.7}

.start-btns{display:flex;flex-direction:column;gap:7px}
.btn-start{border:none;border-radius:13px;padding:13px;font-family:"Noto Sans JP",sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-start:active{opacity:.75;transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#2a4a8a,var(--accent));color:#0d1117}
.btn-weak{background:rgba(240,96,96,.12);border:1.5px solid rgba(240,96,96,.4);color:var(--red)}
.btn-weak:disabled{opacity:.35;cursor:default}
.btn-stats{background:var(--surface);border:1.5px solid var(--border);color:var(--muted)}

/* ── フラッシュカード画面 ── */
#study{padding:10px 14px 10px;gap:6px;max-width:440px;margin:0 auto;width:100%}
.study-header{display:flex;align-items:center;justify-content:space-between}
.study-title{font-size:.7rem;color:var(--muted)}
.study-counter{font-size:.76rem;color:var(--muted)}
.study-counter b{color:var(--text)}
.prog-wrap{height:3px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:4px;transition:width .4s}
.scene{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;position:relative}
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:1.6rem;opacity:0;transition:opacity .15s;pointer-events:none;z-index:10}
.swipe-hint.left{left:8px}.swipe-hint.right{right:8px}
button#card{appearance:none;-webkit-appearance:none;width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:"Noto Sans JP",sans-serif;text-align:center;cursor:pointer;border-radius:18px;padding:16px 18px 14px;display:flex;flex-direction:column;align-items:center;gap:5px;box-shadow:var(--card-shadow);transition:transform .15s,box-shadow .15s,background .25s,border-color .2s;will-change:transform;touch-action:pan-y}
button#card:active{opacity:.9}
button#card.swiping-good{border-color:var(--green);background:rgba(62,207,142,.08)}
button#card.swiping-bad{border-color:var(--red);background:rgba(240,96,96,.08)}
.card-sec{font-size:.58rem;color:var(--muted);letter-spacing:.08em;align-self:flex-start}
.card-word{font-family:"Playfair Display",serif;font-size:clamp(1.8rem,8.5vw,2.5rem);font-weight:700;line-height:1.1}
.card-pron{font-family:"Fira Code",monospace;font-size:.76rem;color:var(--blue)}
.pos-badge{font-size:.6rem;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:.05em}
.pos-動詞{background:rgba(62,207,142,.15);color:var(--green);border:1px solid rgba(62,207,142,.3)}
.pos-名詞{background:rgba(91,141,238,.15);color:var(--blue);border:1px solid rgba(91,141,238,.3)}
.pos-形容詞{background:rgba(232,184,75,.15);color:var(--accent);border:1px solid rgba(232,184,75,.3)}
.pos-副詞{background:rgba(240,96,96,.15);color:var(--red);border:1px solid rgba(240,96,96,.3)}
.pos-前置詞,.pos-接続詞{background:rgba(180,96,240,.15);color:#c060f0;border:1px solid rgba(180,96,240,.3)}
.card-hint{font-size:.61rem;color:var(--muted);opacity:.5}
.back{display:none;width:100%;flex-direction:column;align-items:center;gap:5px}
.show-back .back{display:flex}
.show-back .card-hint{display:none}
.divider{width:100%;height:1px;background:var(--border)}
.card-meaning{font-size:clamp(.9rem,4.2vw,1.15rem);font-weight:700;color:var(--accent);line-height:1.4}
.card-ex-en{font-size:.7rem;color:var(--muted);font-style:italic;line-height:1.6;text-align:center}
.card-ex-en b{color:var(--blue);font-style:normal;font-weight:500}
.card-ex-ja{font-size:.66rem;color:var(--muted);line-height:1.6;text-align:center;opacity:.8}
.study-stats{display:flex;gap:6px}
.study-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px 8px;text-align:center}
.study-stat-n{font-size:.98rem;font-weight:700;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}
.study-stat-l{font-size:.56rem;color:var(--muted);margin-top:2px}
.actions{display:flex;gap:10px}
.btn-action{flex:1;padding:13px 8px;border:none;border-radius:13px;font-family:"Noto Sans JP",sans-serif;font-size:.84rem;font-weight:700;cursor:pointer}
.btn-action:active{opacity:.7;transform:scale(.96)}
.btn-bad{background:rgba(240,96,96,.12);border:1.5px solid rgba(240,96,96,.4);color:var(--red)}
.btn-good{background:rgba(62,207,142,.12);border:1.5px solid rgba(62,207,142,.4);color:var(--green)}
.btn-skip{flex:0 0 46px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-size:1.1rem}

/* ── 4択クイズ画面 ── */
#quiz{padding:10px 14px 12px;gap:8px;max-width:440px;margin:0 auto;width:100%}
.quiz-header{display:flex;align-items:center;justify-content:space-between}
.quiz-title{font-size:.7rem;color:var(--muted)}
.quiz-counter{font-size:.76rem;color:var(--muted)}
.quiz-counter b{color:var(--text)}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 18px;text-align:center;box-shadow:var(--card-shadow);display:flex;flex-direction:column;align-items:center;gap:6px}
.quiz-label{font-size:.62rem;color:var(--muted);letter-spacing:.08em}
.quiz-word{font-family:"Playfair Display",serif;font-size:clamp(1.7rem,8vw,2.3rem);font-weight:700;line-height:1.15;color:var(--text)}
.quiz-meaning{font-size:clamp(.88rem,4vw,1.1rem);font-weight:700;color:var(--accent);line-height:1.4}
.quiz-pron{font-family:"Fira Code",monospace;font-size:.74rem;color:var(--blue)}
.quiz-sec{font-size:.58rem;color:var(--muted)}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-family:"Noto Sans JP",sans-serif;font-size:.84rem;text-align:left;cursor:pointer;transition:all .15s;line-height:1.4}
.choice-btn:active:not([disabled]){opacity:.75;transform:scale(.98)}
.choice-btn.correct{background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green);font-weight:700}
.choice-btn.wrong{background:rgba(240,96,96,.1);border-color:var(--red);color:var(--red)}
.choice-btn.reveal{background:rgba(62,207,142,.08);border-color:var(--green);color:var(--green)}
.choice-btn[disabled]{cursor:default;opacity:.75}
.quiz-feedback{text-align:center;font-size:.82rem;font-weight:700;min-height:1.4em;padding:2px 0}
.quiz-feedback.ok{color:var(--green)}
.quiz-feedback.ng{color:var(--red)}
.quiz-next-btn{border:none;border-radius:13px;padding:12px;font-family:"Noto Sans JP",sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--blue),var(--accent));color:#0d1117;width:100%;display:none}
.quiz-next-btn.show{display:block}

/* ── スペル入力画面 ── */
#spell{padding:10px 14px 12px;gap:8px;max-width:440px;margin:0 auto;width:100%}
.spell-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px 18px;text-align:center;box-shadow:var(--card-shadow);display:flex;flex-direction:column;align-items:center;gap:7px}
.spell-meaning{font-size:clamp(.95rem,4.5vw,1.2rem);font-weight:700;color:var(--accent);line-height:1.4}
.spell-ex{font-size:.7rem;color:var(--muted);font-style:italic;line-height:1.6;text-align:center}
.spell-ex b{color:var(--muted);font-style:normal;background:var(--surface2);padding:0 4px;border-radius:4px}
.spell-pron{font-family:"Fira Code",monospace;font-size:.74rem;color:var(--blue)}
.spell-sec{font-size:.58rem;color:var(--muted)}
.spell-input-wrap{width:100%;position:relative}
.spell-input{width:100%;background:var(--surface2);border:2px solid var(--border);color:var(--text);font-family:"Fira Code",monospace;font-size:1.2rem;padding:10px 14px;border-radius:10px;text-align:center;-webkit-appearance:none;appearance:none;outline:none;transition:border-color .2s;letter-spacing:.06em}
.spell-input:focus{border-color:var(--accent)}
.spell-input.correct{border-color:var(--green);background:rgba(62,207,142,.08);color:var(--green)}
.spell-input.wrong{border-color:var(--red);background:rgba(240,96,96,.08);color:var(--red)}
.spell-hint-row{display:flex;gap:6px;align-items:center;justify-content:center;flex-wrap:wrap}
.spell-char{width:28px;height:32px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:"Fira Code",monospace;font-size:.88rem;font-weight:700;transition:all .2s}
.spell-char.filled{border-color:var(--accent);color:var(--accent)}
.spell-char.correct-c{border-color:var(--green);background:rgba(62,207,142,.15);color:var(--green)}
.spell-char.wrong-c{border-color:var(--red);background:rgba(240,96,96,.1);color:var(--red)}
.spell-feedback{text-align:center;font-size:.82rem;font-weight:700;min-height:1.4em}
.spell-feedback.ok{color:var(--green)}
.spell-feedback.ng{color:var(--red)}
.spell-answer{font-family:"Playfair Display",serif;font-size:1.3rem;font-weight:700;color:var(--text);min-height:1.6em;letter-spacing:.04em}
.spell-actions{display:flex;gap:8px;width:100%}
.spell-submit{flex:1;border:none;border-radius:12px;padding:12px;font-family:"Noto Sans JP",sans-serif;font-size:.86rem;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}
.spell-submit:active{opacity:.75}
.spell-skip{flex:0 0 56px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-size:.78rem;cursor:pointer;font-family:"Noto Sans JP",sans-serif}

/* ── 完了画面 ── */
#done{align-items:center;justify-content:center;gap:13px;padding:28px 24px;text-align:center}
.done-icon{font-size:2.8rem}
.done-title{font-family:"Playfair Display",serif;font-size:1.6rem;color:var(--accent)}
.done-sub{font-size:.82rem;color:var(--muted);line-height:1.7}
.done-stats-row{display:flex;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 28px}
.ds{text-align:center}.ds-n{font-size:1.4rem;font-weight:700}.ds-l{font-size:.63rem;color:var(--muted);margin-top:2px}
.btn-done{border-radius:13px;padding:12px 26px;font-family:"Noto Sans JP",sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;border:none}
.btn-done:active{opacity:.75}
.btn-done-primary{background:linear-gradient(135deg,var(--blue),var(--accent));color:#0d1117}
.btn-done-weak{background:transparent;color:var(--red);border:1.5px solid rgba(240,96,96,.4)!important}
.btn-done-home{background:var(--surface);color:var(--muted);border:1.5px solid var(--border)}

/* ── 統計画面 ── */
#stats-screen{padding:14px;gap:10px;overflow-y:auto}
.stats-header{display:flex;align-items:center;gap:10px}
.stats-back{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px}
.stats-ttl{font-family:"Playfair Display",serif;font-size:1.05rem;color:var(--accent)}
.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px}
.stats-card-title{font-size:.66rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.progress-label{font-size:.7rem;color:var(--muted);width:62px;flex-shrink:0}
.progress-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s}
.fill-green{background:var(--green)}.fill-red{background:var(--red)}.fill-blue{background:var(--blue)}
.progress-num{font-size:.68rem;color:var(--muted);width:48px;text-align:right;flex-shrink:0;white-space:nowrap}
.weak-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.weak-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-radius:8px;padding:8px 10px}
.weak-word{font-family:"Playfair Display",serif;font-size:.93rem;font-weight:700;color:var(--text)}
.weak-meaning{font-size:.66rem;color:var(--muted)}
.weak-count{font-size:.7rem;color:var(--red);font-weight:700;flex-shrink:0}
.btn-clear{background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.3);color:var(--red);border-radius:8px;padding:8px 14px;font-family:"Noto Sans JP",sans-serif;font-size:.73rem;cursor:pointer;margin-top:8px;width:100%}
.empty-msg{font-size:.76rem;color:var(--muted);text-align:center;padding:14px}
.hist-graph{display:flex;align-items:flex-end;gap:3px;height:72px;padding:4px 0}
.hist-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.hist-bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .4s}
.hist-bar.today{background:var(--green)}
.hist-label{font-size:.52rem;color:var(--muted);white-space:nowrap}
.hist-empty{font-size:.74rem;color:var(--muted);text-align:center;padding:16px}

/* ── 問題数・設定パネル ── */
.settings-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.setting-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.setting-label{font-size:.72rem;color:var(--muted);white-space:nowrap;flex-shrink:0}
.count-quick{display:flex;gap:4px;flex-wrap:wrap}
.count-q-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:5px 10px;font-family:"Noto Sans JP",sans-serif;font-size:.72rem;cursor:pointer;transition:all .15s}
.count-q-btn.on{background:rgba(91,141,238,.15);border-color:var(--blue);color:var(--blue);font-weight:700}
.count-q-btn:active{opacity:.7}
.count-custom{width:62px;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:"Fira Code",monospace;font-size:.82rem;padding:5px 6px;border-radius:8px;text-align:center;-webkit-appearance:none;appearance:none;outline:none}
.count-custom:focus{border-color:var(--accent)}
/* トグルスイッチ */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:38px;height:22px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;position:relative;transition:all .22s;flex-shrink:0}
.toggle-track.on{background:rgba(62,207,142,.25);border-color:var(--green)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--muted);border-radius:50%;transition:all .22s}
.toggle-track.on .toggle-thumb{left:18px;background:var(--green)}
.toggle-label{font-size:.72rem;color:var(--muted);transition:color .22s;user-select:none}
.toggle-track.on+.toggle-label{color:var(--green)}
/* プレビューバー */
.deck-preview{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.preview-count{font-size:.72rem;font-weight:700;color:var(--accent)}
.preview-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:0 8px}
.preview-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:4px;transition:width .35s}
.preview-label{font-size:.66rem;color:var(--muted)}

[data-fs="sm"]{--fs-base:.88rem}[data-fs="md"]{--fs-base:1rem}[data-fs="lg"]{--fs-base:1.1rem}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ── 確認モーダル ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 22px 16px;max-width:300px;width:88%;text-align:center;display:flex;flex-direction:column;gap:12px;box-shadow:var(--card-shadow);transform:scale(.94);transition:transform .2s}
.modal-overlay.show .modal-box{transform:scale(1)}
.modal-msg{font-size:.88rem;line-height:1.6;color:var(--text)}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:11px;font-family:"Noto Sans JP",sans-serif;font-size:.84rem;font-weight:700;cursor:pointer}
.modal-btn:active{opacity:.75}
.modal-cancel{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted)}
.modal-confirm{background:rgba(240,96,96,.15);border:1.5px solid rgba(240,96,96,.4);color:var(--red)}
</style>
</head>
<body>

<!-- ホーム -->
<div id="home" class="screen active">
  <div class="top-bar">
    <div>
      <div class="logo">Vocab Flash</div>
      <div class="logo-sub">英単語 1500語 フラッシュカード</div>
    </div>
    <div class="top-controls">
      <button class="icon-btn" id="fs-toggle-btn" onclick="toggleFsPanel()" title="文字サイズ">Aa</button>
      <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="テーマ">🌙</button>
    </div>
  </div>

  <div class="fs-panel hidden" id="fs-panel">
    <span class="fs-label">文字サイズ</span>
    <div class="fs-btns">
      <button class="fs-btn" id="fs-sm" onclick="setFs('sm')">小</button>
      <button class="fs-btn on" id="fs-md" onclick="setFs('md')">中</button>
      <button class="fs-btn" id="fs-lg" onclick="setFs('lg')">大</button>
    </div>
  </div>

  <div class="stats-banner">
    <div class="sstat"><div class="sstat-n gold" id="h-total">1500</div><div class="sstat-l">総語数</div></div>
    <div class="sstat"><div class="sstat-n green" id="h-learned">0</div><div class="sstat-l">覚えた</div></div>
    <div class="sstat"><div class="sstat-n red" id="h-weak">0</div><div class="sstat-l">苦手語</div></div>
  </div>

  <div class="section-label">セクションで選ぶ</div>
  <div class="sec-grid" id="sec-grid">
    <button class="sec-btn on" id="sec-all" onclick="toggleSec(0)">全て
      <span class="prog-pip"><span class="prog-pip-fill" id="pip-all" style="width:0%"></span></span>
    </button>
  </div>

  <div class="section-label">番号で範囲指定</div>
  <div class="range-row">
    <input class="range-input" type="number" id="range-from" placeholder="1" min="1" max="1500" oninput="onSettingChange()">
    <span class="range-sep">〜</span>
    <input class="range-input" type="number" id="range-to" placeholder="1500" min="1" max="1500" oninput="onSettingChange()">
  </div>

  <div class="settings-box">
    <!-- 問題数 -->
    <div class="setting-row">
      <span class="setting-label">問題数</span>
      <div class="count-quick" id="count-quick">
        <button class="count-q-btn" data-n="10" onclick="setCountQuick(10)">10</button>
        <button class="count-q-btn" data-n="20" onclick="setCountQuick(20)">20</button>
        <button class="count-q-btn" data-n="50" onclick="setCountQuick(50)">50</button>
        <button class="count-q-btn on" data-n="0" onclick="setCountQuick(0)">全部</button>
        <input class="count-custom" id="count-custom" type="number" min="1" max="1500" placeholder="任意" oninput="onCustomCount(this)">
      </div>
    </div>
    <!-- 覚えた語を含む -->
    <div class="setting-row">
      <span class="setting-label">覚えた単語</span>
      <div class="toggle-wrap" onclick="toggleIncludeLearned()">
        <div class="toggle-track" id="learned-toggle"><div class="toggle-thumb"></div></div>
        <span class="toggle-label" id="learned-toggle-label">除外する</span>
      </div>
    </div>
    <!-- 対象語数プレビュー -->
    <div class="deck-preview">
      <span class="preview-count" id="preview-count">— 語</span>
      <div class="preview-bar-wrap"><div class="preview-bar-fill" id="preview-bar" style="width:0%"></div></div>
      <span class="preview-label">/ 1500語</span>
    </div>
  </div>

  <div class="mode-label">学習モード</div>
  <div class="mode-grid">
    <button class="mode-btn on" id="mode-flash" onclick="selectMode('flash')">
      <span class="mode-icon">🃏</span>
      <span class="mode-name">フラッシュカード</span>
      <span class="mode-desc">タップして表裏確認</span>
    </button>
    <button class="mode-btn" id="mode-quiz-ej" onclick="selectMode('quiz-ej')">
      <span class="mode-icon">🇬🇧→🇯🇵</span>
      <span class="mode-name">4択 英語→日本語</span>
      <span class="mode-desc">英単語から意味を選択</span>
    </button>
    <button class="mode-btn" id="mode-quiz-je" onclick="selectMode('quiz-je')">
      <span class="mode-icon">🇯🇵→🇬🇧</span>
      <span class="mode-name">4択 日本語→英語</span>
      <span class="mode-desc">意味から英単語を選択</span>
    </button>
    <button class="mode-btn" id="mode-spell" onclick="selectMode('spell')">
      <span class="mode-icon">⌨️</span>
      <span class="mode-name">スペル入力</span>
      <span class="mode-desc">意味を見て英語を入力</span>
    </button>
  </div>

  <div class="start-btns">
    <button class="btn-start btn-primary" onclick="startStudy('normal')">▶ 学習開始</button>
    <button class="btn-start btn-weak" id="btn-weak-start" onclick="startStudy('weak')">✗ 苦手単語を集中学習</button>
    <button class="btn-start btn-stats" onclick="showStats()">📊 学習統計・苦手リスト</button>
  </div>
</div>

<!-- フラッシュカード -->
<div id="study" class="screen">
  <div class="study-header">
    <div class="study-title" id="study-title">通常学習</div>
    <div class="study-counter"><b id="cur">1</b> / <b id="tot">1</b></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  <div class="scene" id="scene">
    <span class="swipe-hint left" id="hint-bad">✗</span>
    <span class="swipe-hint right" id="hint-good">✓</span>
    <button id="card" onclick="flip()">
      <span class="card-sec" id="c-sec"></span>
      <span class="card-word" id="c-word"></span>
      <span class="card-pron" id="c-pron"></span>
      <span class="pos-badge" id="c-pos"></span>
      <span class="card-hint">タップして答えを見る 👆<br><span style="font-size:.55rem;opacity:.7">← もう一度 ／ 覚えた →</span></span>
      <div class="back">
        <div class="divider"></div>
        <span class="card-meaning" id="c-meaning"></span>
        <div class="divider"></div>
        <span class="card-ex-en" id="c-ex-en"></span>
        <span class="card-ex-ja" id="c-ex-ja"></span>
      </div>
    </button>
  </div>
  <div class="study-stats">
    <div class="study-stat"><div class="study-stat-n g" id="s-good">0</div><div class="study-stat-l">✓ 覚えた</div></div>
    <div class="study-stat"><div class="study-stat-n r" id="s-bad">0</div><div class="study-stat-l">✗ もう一度</div></div>
    <div class="study-stat"><div class="study-stat-n b" id="s-left">0</div><div class="study-stat-l">残り</div></div>
  </div>
  <div class="actions">
    <button class="btn-action btn-bad" onclick="answer(false)">✗ もう一度</button>
    <button class="btn-action btn-skip" onclick="nextCard()">→</button>
    <button class="btn-action btn-good" onclick="answer(true)">✓ 覚えた</button>
  </div>
  <button class="btn-action" style="background:none;border:none;color:var(--muted);font-size:.7rem;padding:4px;margin-top:-2px" onclick="confirmHome()">⏹ 中断してホームに戻る</button>
</div>

<!-- 4択クイズ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-title" id="quiz-title">4択クイズ</div>
    <div class="quiz-counter"><b id="q-cur">1</b> / <b id="q-tot">1</b></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="q-prog" style="width:0%"></div></div>
  <div id="quiz-card" class="quiz-card">
    <span class="quiz-label" id="q-label">英語の意味は？</span>
    <span class="quiz-word" id="q-word"></span>
    <span class="quiz-pron" id="q-pron"></span>
    <span class="quiz-sec" id="q-sec"></span>
  </div>
  <div class="study-stats">
    <div class="study-stat"><div class="study-stat-n g" id="qs-good">0</div><div class="study-stat-l">✓ 正解</div></div>
    <div class="study-stat"><div class="study-stat-n r" id="qs-bad">0</div><div class="study-stat-l">✗ 不正解</div></div>
    <div class="study-stat"><div class="study-stat-n b" id="qs-left">0</div><div class="study-stat-l">残り</div></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="quiz-feedback" id="quiz-feedback"></div>
  <button class="quiz-next-btn" id="quiz-next" onclick="quizNext()">次の問題 →</button>
  <button class="btn-action" style="background:none;border:none;color:var(--muted);font-size:.7rem;padding:4px" onclick="confirmHome()">⏹ 中断してホームに戻る</button>
</div>

<!-- スペル入力 -->
<div id="spell" class="screen">
  <div class="quiz-header">
    <div class="quiz-title" id="spell-title">スペル入力</div>
    <div class="quiz-counter"><b id="sp-cur">1</b> / <b id="sp-tot">1</b></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="sp-prog" style="width:0%"></div></div>
  <div class="spell-card">
    <span class="quiz-label">日本語の意味</span>
    <span class="spell-meaning" id="sp-meaning"></span>
    <div class="divider" style="width:100%"></div>
    <span class="spell-ex" id="sp-ex"></span>
    <span class="spell-pron" id="sp-pron"></span>
    <span class="spell-sec" id="sp-sec"></span>
  </div>
  <div class="spell-hint-row" id="sp-hint-row"></div>
  <div class="spell-input-wrap">
    <input class="spell-input" id="sp-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="英単語を入力...">
  </div>
  <div class="spell-feedback" id="sp-feedback"></div>
  <div class="spell-answer" id="sp-answer"></div>
  <div class="study-stats">
    <div class="study-stat"><div class="study-stat-n g" id="sps-good">0</div><div class="study-stat-l">✓ 正解</div></div>
    <div class="study-stat"><div class="study-stat-n r" id="sps-bad">0</div><div class="study-stat-l">✗ 不正解</div></div>
    <div class="study-stat"><div class="study-stat-n b" id="sps-left">0</div><div class="study-stat-l">残り</div></div>
  </div>
  <div class="spell-actions">
    <button class="spell-submit" id="sp-submit" onclick="spellSubmit()">確認する</button>
    <button class="spell-skip" onclick="spellSkip()">スキップ</button>
  </div>
  <button class="btn-action" style="background:none;border:none;color:var(--muted);font-size:.7rem;padding:4px;margin-top:-2px" onclick="confirmHome()">⏹ 中断してホームに戻る</button>
</div>

<!-- 完了 -->
<div id="done" class="screen">
  <div class="done-icon">🎉</div>
  <div class="done-title">セット完了！</div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-stats-row">
    <div class="ds"><div class="ds-n g" id="d-good">0</div><div class="ds-l">正解</div></div>
    <div class="ds"><div class="ds-n r" id="d-bad">0</div><div class="ds-l">不正解</div></div>
  </div>
  <button class="btn-done btn-done-primary" onclick="restartSame()">🔄 同じ範囲をやり直す</button>
  <button class="btn-done btn-done-weak" id="done-weak-btn" onclick="startStudy('weak')" style="display:none"></button>
  <button class="btn-done btn-done-home" onclick="goHome()">🏠 ホームに戻る</button>
</div>

<!-- 統計 -->
<div id="stats-screen" class="screen">
  <div class="stats-header">
    <button class="stats-back" onclick="goHome()">←</button>
    <div class="stats-ttl">学習統計・苦手リスト</div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">📅 直近14日間の学習語数</div>
    <div id="hist-container"></div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">📚 セクション別 進捗</div>
    <div id="sec-progress"></div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">⚠️ 苦手単語リスト <span id="weak-count-label" style="color:var(--red)"></span></div>
    <div class="weak-list" id="weak-list"></div>
    <button class="btn-clear" onclick="clearWeak()">苦手リストをリセット</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-msg" id="confirm-msg"></div>
    <div class="modal-btns">
      <button class="modal-btn modal-cancel" onclick="modalClose()">キャンセル</button>
      <button class="modal-btn modal-confirm" id="confirm-ok">中断して戻る</button>
    </div>
  </div>
</div>

//  localStorage
// ══════════════════════════════════════════
const LS = { LEARNED:"vf_learned", WEAK:"vf_weak", HIST:"vf_hist", THEME:"vf_theme", FS:"vf_fs", SETTINGS:"vf_settings" };
const load = k => { try{ return JSON.parse(localStorage.getItem(k)||"null"); }catch{return null;} };
const save = (k,v) => localStorage.setItem(k, JSON.stringify(v));
function loadLearned(){ try{return new Set(load(LS.LEARNED)||[]);}catch{return new Set()} }
function saveLearned(s){ save(LS.LEARNED,[...s]); }
function loadWeak(){ try{return new Map(Object.entries(load(LS.WEAK)||{}));}catch{return new Map()} }
function saveWeak(m){ const o={}; m.forEach((v,k)=>o[k]=v); save(LS.WEAK,o); }
function loadHist(){ try{return load(LS.HIST)||{};}catch{return {}} }
function saveHist(h){ save(LS.HIST,h); }

let learned = loadLearned();
let weakMap = loadWeak();

// ── 状態 ──
let deck=[], idx=0, goodSet=new Set(), badSet=new Set();
let studyMode="normal";   // normal | weak
let learnMode="flash";    // flash | quiz-ej | quiz-je | spell
let selectedSec=0;

// ── 問題状態 ──
let quizAnswered = false;
let spellAnswered = false;
let spellAttempts = 0;

// ══════════════════════════════════════════
//  テーマ・フォントサイズ
// ══════════════════════════════════════════
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("theme-btn").textContent = t==="dark"?"🌙":"☀️";
  save(LS.THEME,t);
}
function toggleTheme(){
  applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
}
function applyFs(f){
  document.documentElement.setAttribute("data-fs",f);
  save(LS.FS,f);
  ["sm","md","lg"].forEach(k=>document.getElementById("fs-"+k).classList.toggle("on",k===f));
}
function setFs(f){ applyFs(f); }
function toggleFsPanel(){
  const p=document.getElementById("fs-panel");
  p.classList.toggle("hidden");
  document.getElementById("fs-toggle-btn").classList.toggle("on",!p.classList.contains("hidden"));
}

// ══════════════════════════════════════════
//  学習モード選択
// ══════════════════════════════════════════
function selectMode(m){
  learnMode = m;
  ["flash","quiz-ej","quiz-je","spell"].forEach(k=>{
    document.getElementById("mode-"+k).classList.toggle("on",k===m);
  });
}

// ══════════════════════════════════════════
//  セクションボタン生成
// ══════════════════════════════════════════
function buildSecButtons(){
  const grid=document.getElementById("sec-grid");
  for(let s=1;s<=15;s++){
    const btn=document.createElement("button");
    btn.className="sec-btn"; btn.id="sec-"+s;
    btn.onclick=()=>toggleSec(s);
    btn.innerHTML=`Sec ${s}<span class="badge hidden" id="badge-${s}">★</span><span class="prog-pip"><span class="prog-pip-fill" id="pip-${s}" style="width:0%"></span></span>`;
    grid.appendChild(btn);
  }
}

function toggleSec(n){
  selectedSec=n;
  document.querySelectorAll(".sec-btn").forEach(b=>b.classList.remove("on"));
  document.getElementById(n===0?"sec-all":"sec-"+n).classList.add("on");
  document.getElementById("range-from").value="";
  document.getElementById("range-to").value="";
  onSettingChange();
}

// ══════════════════════════════════════════
//  ホーム更新
// ══════════════════════════════════════════
function updateHome(){
  document.getElementById("h-total").textContent=VOCAB.length;
  document.getElementById("h-learned").textContent=learned.size;
  document.getElementById("h-weak").textContent=weakMap.size;
  const wb=document.getElementById("btn-weak-start");
  wb.disabled=weakMap.size===0;
  wb.textContent=weakMap.size>0?`✗ 苦手単語を集中学習 (${weakMap.size}語)`:"✗ 苦手単語なし";
  const doneAll=VOCAB.filter(v=>learned.has(v.no)).length;
  document.getElementById("pip-all").style.width=(doneAll/VOCAB.length*100)+"%";
  for(let s=1;s<=15;s++){
    const total=VOCAB.filter(v=>v.s===s).length;
    const done=VOCAB.filter(v=>v.s===s&&learned.has(v.no)).length;
    const pct=total>0?done/total*100:0;
    const pip=document.getElementById("pip-"+s);
    const badge=document.getElementById("badge-"+s);
    if(pip) pip.style.width=pct+"%";
    if(badge) badge.classList.toggle("hidden",pct<100);
  }
  updatePreview();
}

  const s = load(LS.SETTINGS)||{};

function updatePreview(){
  const from = parseInt(document.getElementById("range-from").value)||1;
  const to   = parseInt(document.getElementById("range-to").value)||1500;
  let pool = VOCAB.filter(v=>{
    const inSec   = selectedSec===0 || v.s===selectedSec;
    const inRange = v.no>=from && v.no<=to;
    const inLearned = includeLearned || !learned.has(v.no);
    return inSec && inRange && inLearned;
  });
  const poolSize = pool.length;
  const actual   = countLimit > 0 ? Math.min(countLimit, poolSize) : poolSize;
  document.getElementById("preview-count").textContent = `${actual} 語`;
  document.getElementById("preview-bar").style.width = (actual/VOCAB.length*100)+"%";
  document.getElementById("preview-label").textContent = `/ ${poolSize}語 対象`;
}

// ══════════════════════════════════════════
//  デッキ構築
// ══════════════════════════════════════════
function buildDeck(m){
  studyMode=m;
  const from=parseInt(document.getElementById("range-from").value)||1;
  const to=parseInt(document.getElementById("range-to").value)||1500;
  let pool;
  if(m==="weak"){
    const nos=[...weakMap.keys()].map(Number);
    pool=VOCAB.filter(v=>nos.includes(v.no));
  } else {
    pool=VOCAB.filter(v=>{
      const inSec    = selectedSec===0 || v.s===selectedSec;
      const inRange  = v.no>=from && v.no<=to;
      const inLearned = includeLearned || !learned.has(v.no);
      return inSec && inRange && inLearned;
    });
  }
  // シャッフル
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  // 問題数制限（苦手モードには適用しない）
  if(m!=="weak" && countLimit>0 && pool.length>countLimit){
    pool = pool.slice(0, countLimit);
  }
  return pool;
}

function startStudy(m){
  deck=buildDeck(m);
  if(deck.length===0){ alert("該当する単語がありません"); return; }
  idx=0; goodSet=new Set(); badSet=new Set();
  const title = m==="weak"?`苦手集中 (${deck.length}語)`:selectedSec>0?`Section ${selectedSec}`:`${modeLabel()} (${deck.length}語)`;
  if(learnMode==="flash"){
    document.getElementById("study-title").textContent=title;
    showScreen("study"); render();
  } else if(learnMode==="quiz-ej"||learnMode==="quiz-je"){
    document.getElementById("quiz-title").textContent=title;
    showScreen("quiz"); renderQuiz();
  } else if(learnMode==="spell"){
    document.getElementById("spell-title").textContent=title;
    showScreen("spell"); renderSpell();
  }
}

function modeLabel(){
  return {flash:"フラッシュカード","quiz-ej":"4択 英→日","quiz-je":"4択 日→英",spell:"スペル入力"}[learnMode]||"学習";
}

// ══════════════════════════════════════════
//  ━━━━ 4択クイズ ━━━━
// ══════════════════════════════════════════
function getDistractors(correct, count){
  // 同じ品詞を優先、次に同じセクション隣接、その他ランダム
  const isEJ = learnMode==="quiz-ej";
  const correctKey = isEJ ? correct.m.split('；')[0].split('(')[0].trim() : correct.w;
  let pool = VOCAB.filter(v=>v.no!==correct.no);
  // 同品詞を優先
  const samePOS = pool.filter(v=>v.pos===correct.pos);
  const others  = pool.filter(v=>v.pos!==correct.pos);
  // シャッフル
  const shuffle = arr=>{
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  };
  const combined = [...shuffle(samePOS), ...shuffle(others)];
  // 重複意味を避ける
  const chosen=[]; const seen=new Set([correctKey]);
  for(const v of combined){
    const key = isEJ ? v.m.split('；')[0].split('(')[0].trim() : v.w;
    if(!seen.has(key)){
      seen.add(key);
      chosen.push(v);
      if(chosen.length>=count) break;
    }
  }
  return chosen;
}

function renderQuiz(){
  if(!deck[idx]) return;
  quizAnswered=false;
  const v=deck[idx];
  const isEJ=learnMode==="quiz-ej";

  // 問題表示
  if(isEJ){
    document.getElementById("q-label").textContent="この英単語の意味は？";
    document.getElementById("q-word").textContent=v.w;
    document.getElementById("q-pron").textContent=v.p;
  } else {
    document.getElementById("q-label").textContent="この意味の英単語は？";
    document.getElementById("q-word").textContent=v.m.split('；')[0];
    document.getElementById("q-pron").textContent="";
  }
  document.getElementById("q-sec").textContent=`Section ${v.s} No.${v.no}`;

  // 選択肢
  const distractors=getDistractors(v,3);
  const options=[v,...distractors];
  // シャッフル
  for(let i=options.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [options[i],options[j]]=[options[j],options[i]];
  }

  const choicesEl=document.getElementById("choices");
  choicesEl.innerHTML="";
  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.className="choice-btn";
    btn.textContent = isEJ ? opt.m : opt.w;
    btn.dataset.no=opt.no;
    btn.onclick=()=>selectChoice(btn, v.no, opt.no);
    choicesEl.appendChild(btn);
  });
  document.getElementById("quiz-feedback").textContent="";
  document.getElementById("quiz-feedback").className="quiz-feedback";
  document.getElementById("quiz-next").classList.remove("show");

  // カウンター更新
  const done=goodSet.size+badSet.size, total=deck.length;
  document.getElementById("q-prog").style.width=(done/total*100)+"%";
  document.getElementById("q-cur").textContent=idx+1;
  document.getElementById("q-tot").textContent=total;
  document.getElementById("qs-good").textContent=goodSet.size;
  document.getElementById("qs-bad").textContent=badSet.size;
  document.getElementById("qs-left").textContent=total-done;
}

function selectChoice(btn, correctNo, selectedNo){
  if(quizAnswered) return;
  quizAnswered=true;
  const isCorrect=correctNo===selectedNo;
  const fbEl=document.getElementById("quiz-feedback");
  const v=deck[idx];

  // ボタン状態
  document.querySelectorAll(".choice-btn").forEach(b=>{
    b.disabled=true;
    const no=parseInt(b.dataset.no);
    if(no===correctNo) b.classList.add("correct");
    else if(no===selectedNo && !isCorrect) b.classList.add("wrong");
  });

  if(isCorrect){
    fbEl.textContent="✓ 正解！";
    fbEl.className="quiz-feedback ok";
    recordAnswer(v, true);
    // 正解時は少し待って自動次へ
    setTimeout(()=>quizNext(), 800);
  } else {
    fbEl.textContent=`✗ 不正解。正解：${learnMode==="quiz-ej"?v.m:v.w}`;
    fbEl.className="quiz-feedback ng";
    recordAnswer(v, false);
    document.getElementById("quiz-next").classList.add("show");
  }
}

function quizNext(){
  idx++;
  if(idx>=deck.length){ showDone(); return; }
  renderQuiz();
}

function renderSpell(){
  if(!deck[idx]) return;
  spellAnswered=false; spellAttempts=0;
  const v=deck[idx];

  document.getElementById("sp-meaning").textContent=v.m;
  // 例文の単語を隠す
  const re=new RegExp("(\\b"+escapeReg(v.w)+"[a-z]*)","gi");
  document.getElementById("sp-ex").innerHTML=v.e.replace(re,'<b>___</b>');
  document.getElementById("sp-pron").textContent=v.p;
  document.getElementById("sp-sec").textContent=`Section ${v.s} No.${v.no}`;

  // 文字ヒント表示（文字数バー）
  renderSpellHints(v.w, "");

  const inp=document.getElementById("sp-input");
  inp.value=""; inp.className="spell-input"; inp.disabled=false;
  inp.placeholder="英単語を入力...";
  document.getElementById("sp-feedback").textContent="";
  document.getElementById("sp-feedback").className="spell-feedback";
  document.getElementById("sp-answer").textContent="";
  document.getElementById("sp-submit").textContent="確認する";
  document.getElementById("sp-submit").disabled=false;

  // 入力中にヒント更新
  inp.oninput=()=>renderSpellHints(v.w, inp.value);
  // Enterキーでも送信
  inp.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); spellSubmit(); } };

  // カウンター
  const done=goodSet.size+badSet.size, total=deck.length;
  document.getElementById("sp-prog").style.width=(done/total*100)+"%";
  document.getElementById("sp-cur").textContent=idx+1;
  document.getElementById("sp-tot").textContent=total;
  document.getElementById("sps-good").textContent=goodSet.size;
  document.getElementById("sps-bad").textContent=badSet.size;
  document.getElementById("sps-left").textContent=total-done;

  // フォーカス（少し遅延）
  setTimeout(()=>inp.focus(), 100);
}

function renderSpellHints(word, typed){
  const row=document.getElementById("sp-hint-row");
  row.innerHTML="";
  for(let i=0;i<word.length;i++){
    const box=document.createElement("span");
    box.className="spell-char";
    const typedL=typed.toLowerCase();
    const wordL=word.toLowerCase();
    if(i<typed.length){
      box.textContent=typed[i];
      if(typedL[i]===wordL[i]) box.classList.add("filled");
      else box.classList.add("wrong-c");
    } else {
      // 最初の文字は常に表示（ヒント）
      if(i===0) box.textContent=word[0];
      else box.textContent="＿";
    }
    row.appendChild(box);
  }
}

function spellSubmit(){
  if(spellAnswered) return;
  const v=deck[idx];
  const inp=document.getElementById("sp-input");
  const typed=inp.value.trim();
  if(!typed) return;

  spellAttempts++;
  const correct=typed.toLowerCase()===v.w.toLowerCase();
  const fbEl=document.getElementById("sp-feedback");
  const ansEl=document.getElementById("sp-answer");

  if(correct){
    spellAnswered=true;
    inp.className="spell-input correct";
    fbEl.textContent="✓ 正解！";
    fbEl.className="spell-feedback ok";
    renderSpellHints(v.w, v.w);
    ansEl.textContent="";
    recordAnswer(v, true);
    document.getElementById("sp-submit").disabled=true;
    setTimeout(()=>spellNext(), 900);
  } else {
    inp.className="spell-input wrong";
    fbEl.textContent=spellAttempts>=2
      ? `✗ 不正解。正解：${v.w}`
      : `✗ もう一度試してみましょう`;
    fbEl.className="spell-feedback ng";
    if(spellAttempts>=2){
      spellAnswered=true;
      ansEl.textContent=v.w;
      renderSpellHints(v.w, v.w);
      recordAnswer(v, false);
      document.getElementById("sp-submit").textContent="次へ →";
      document.getElementById("sp-submit").onclick=spellNext;
    } else {
      // 再入力させる
      setTimeout(()=>{
        inp.value="";
        inp.className="spell-input";
        inp.oninput=()=>renderSpellHints(v.w, inp.value);
        inp.focus();
      }, 600);
    }
  }
}

function spellSkip(){
  if(spellAnswered) return;
  spellAnswered=true;
  const v=deck[idx];
  const fbEl=document.getElementById("sp-feedback");
  const ansEl=document.getElementById("sp-answer");

function recordAnswer(v, good){
  if(good){
    goodSet.add(v.no); learned.add(v.no);
    if(weakMap.has(String(v.no))){
      const cnt=weakMap.get(String(v.no))-1;
      if(cnt<=0) weakMap.delete(String(v.no));
      else weakMap.set(String(v.no),cnt);
      saveWeak(weakMap);
    }
    const today=new Date().toISOString().slice(0,10);
    const hist=loadHist(); hist[today]=(hist[today]||0)+1; saveHist(hist);
  } else {
    badSet.add(v.no);
    const key=String(v.no);
    weakMap.set(key,(weakMap.get(key)||0)+1);
    saveWeak(weakMap);
  }
  saveLearned(learned);
}

function showStats(){

    secEl.innerHTML+=`<div class="progress-row">

  }
  const listEl=document.getElementById("weak-list");

  listEl.innerHTML="";
  if(weakMap.size===0){
    listEl.innerHTML='<div class="empty-msg">苦手単語はありません 🎉</div>';
  } else {
    [...weakMap.entries()].sort((a,b)=>b[1]-a[1]).forEach(([no,cnt])=>{
      const v=VOCAB.find(x=>x.no===Number(no));
      if(!v) return;
      listEl.innerHTML+=`<div class="weak-item">
        <div><div class="weak-word">${v.w}</div><div class="weak-meaning">${v.m}</div></div>
        <div class="weak-count">✗ ${cnt}回</div>
      </div>`;
    });
  }
  showScreen("stats-screen");
}

function renderHistGraph(){
  const container=document.getElementById("hist-container");
  const hist=loadHist();
  const today=new Date();
  const days=[];
  for(let i=13;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const label=(d.getMonth()+1)+"/"+(d.getDate());
    days.push({key,label,count:hist[key]||0,isToday:i===0});
  }
  const max=Math.max(...days.map(d=>d.count),1);
  if(days.every(d=>d.count===0)){
    container.innerHTML='<div class="hist-empty">まだ学習記録がありません</div>'; return;
  }
  container.innerHTML=`<div class="hist-graph">${days.map(d=>{
    const h=Math.max(Math.round(d.count/max*60),d.count>0?4:2);
    return `<div class="hist-bar-wrap">
      <div style="font-size:.5rem;color:var(--muted);text-align:center">${d.count>0?d.count:''}</div>
      <div class="hist-bar${d.isToday?' today':''}" style="height:${h}px"></div>
      <div class="hist-label">${d.isToday?'今日':d.label}</div>
    </div>`;
  }).join('')}</div>`;
}

// ══════════════════════════════════════════
//  スワイプ（フラッシュカード専用）
// ══════════════════════════════════════════
(function(){
  const card=document.getElementById("card");
  let startX=0, startY=0, curX=0, dragging=false;
  const THRESHOLD=80;
  function onStart(x,y){ startX=x; startY=y; curX=x; dragging=true; card.style.transition="none"; }
  function onMove(x,y){
    if(!dragging) return; curX=x;
    const dx=x-startX, dy=y-startY;
    if(Math.abs(dy)>Math.abs(dx)*1.5){ dragging=false; resetCard(); return; }
    card.style.transform=`translateX(${dx}px) rotate(${dx*0.08}deg)`;
    const ratio=Math.min(Math.abs(dx)/THRESHOLD,1);
    document.getElementById("hint-good").style.opacity=dx>0?ratio:0;
    document.getElementById("hint-bad").style.opacity=dx<0?ratio:0;
    card.classList.toggle("swiping-good",dx>THRESHOLD*0.5);
    card.classList.toggle("swiping-bad",dx<-THRESHOLD*0.5);
  }
  function onEnd(){
    if(!dragging){ resetCard(); return; }
    dragging=false;
    const dx=curX-startX;
    card.style.transition="transform .25s,box-shadow .25s,background .2s,border-color .2s";
    if(dx>THRESHOLD){ card.style.transform="translateX(120vw) rotate(20deg)"; setTimeout(()=>{resetCard();answer(true);},220); }
    else if(dx<-THRESHOLD){ card.style.transform="translateX(-120vw) rotate(-20deg)"; setTimeout(()=>{resetCard();answer(false);},220); }
    else resetCard();
  }
  function resetCard(){
    card.style.transition="transform .25s"; card.style.transform="";
    card.classList.remove("swiping-good","swiping-bad");
    document.getElementById("hint-good").style.opacity=0;
    document.getElementById("hint-bad").style.opacity=0;
    dragging=false;
  }
  card.addEventListener("touchstart",e=>{if(e.touches.length===1)onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener("touchmove",e=>{if(e.touches.length===1)onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener("touchend",onEnd);
  card.addEventListener("mousedown",e=>onStart(e.clientX,e.clientY));
  document.addEventListener("mousemove",e=>{if(dragging)onMove(e.clientX,e.clientY);});
  document.addEventListener("mouseup",onEnd);
})();

// ══════════════════════════════════════════
//  初期化
// ══════════════════════════════════════════
(function init(){
  applyTheme(load(LS.THEME)||"dark");
  applyFs(load(LS.FS)||"md");
  loadSettings();
  buildSecButtons();
  updateHome();
  applySettingsUI();
})();
</script>
</body>
