<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>英単語フラッシュカード</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--surface:#161d2b;--surface2:#1e2740;
  --accent:#e8b84b;--blue:#5b8dee;--green:#3ecf8e;--red:#f06060;
  --text:#e6eaf3;--muted:#6b7a99;--border:rgba(255,255,255,0.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Noto Sans JP",sans-serif;overflow:hidden}

/* ── 画面管理 ── */
.screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg)}
.screen.active{display:flex}

/* ── ホーム画面 ── */
#home{padding:16px;gap:12px;overflow-y:auto}
.logo-area{text-align:center;padding:20px 0 8px}
.logo{font-family:"Playfair Display",serif;font-size:1.6rem;color:var(--accent);letter-spacing:.04em}
.logo-sub{font-size:.72rem;color:var(--muted);margin-top:4px}

.stats-banner{display:flex;gap:8px}
.sstat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.sstat-n{font-size:1.3rem;font-weight:700}
.sstat-n.gold{color:var(--accent)}
.sstat-n.red{color:var(--red)}
.sstat-n.blue{color:var(--blue)}
.sstat-l{font-size:.6rem;color:var(--muted);margin-top:2px}

.section-label{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}

/* セクション選択 */
.sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sec-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);
  font-family:"Noto Sans JP",sans-serif;font-size:.78rem;padding:8px 4px;border-radius:10px;cursor:pointer}
.sec-btn.on{background:rgba(232,184,75,.12);border-color:var(--accent);color:var(--accent);font-weight:700}
.sec-btn:active{opacity:.7}

/* 番号範囲 */
.range-row{display:flex;gap:8px;align-items:center}
.range-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:"Fira Code",monospace;font-size:.9rem;padding:8px 10px;border-radius:8px;text-align:center;
  -webkit-appearance:none;appearance:none}
.range-input:focus{outline:none;border-color:var(--accent)}
.range-sep{color:var(--muted);font-size:.8rem}

/* 開始ボタン群 */
.start-btns{display:flex;flex-direction:column;gap:8px}
.btn-start{border:none;border-radius:13px;padding:14px;font-family:"Noto Sans JP",sans-serif;
  font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-start:active{opacity:.75;transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#2a4a8a,var(--accent));color:#0d1117}
.btn-weak{background:rgba(240,96,96,.12);border:1.5px solid rgba(240,96,96,.4);color:var(--red)}
.btn-weak:disabled{opacity:.35;cursor:default}
.btn-stats{background:var(--surface);border:1.5px solid var(--border);color:var(--muted)}

/* ── フラッシュカード画面 ── */
#study{padding:10px 14px 12px;gap:6px;max-width:440px;margin:0 auto;width:100%}

.study-header{display:flex;align-items:center;justify-content:space-between}
.study-title{font-size:.72rem;color:var(--muted)}
.study-counter{font-size:.78rem;color:var(--muted)}
.study-counter b{color:var(--text)}
.prog-wrap{height:3px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:4px;transition:width .4s}

.scene{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}

button#card{appearance:none;-webkit-appearance:none;width:100%;background:var(--surface);
  border:1px solid var(--border);color:var(--text);font-family:"Noto Sans JP",sans-serif;
  text-align:center;cursor:pointer;border-radius:18px;padding:16px 18px 14px;
  display:flex;flex-direction:column;align-items:center;gap:6px}
button#card:active{opacity:.85}

.card-sec{font-size:.6rem;color:var(--muted);letter-spacing:.08em;align-self:flex-start}
.card-word{font-family:"Playfair Display",serif;font-size:clamp(1.9rem,9vw,2.6rem);font-weight:700;line-height:1.1}
.card-pron{font-family:"Fira Code",monospace;font-size:.78rem;color:var(--blue)}
.pos-badge{font-size:.62rem;font-weight:700;padding:2px 10px;border-radius:20px;letter-spacing:.05em}
.pos-動詞{background:rgba(62,207,142,.15);color:var(--green);border:1px solid rgba(62,207,142,.3)}
.pos-名詞{background:rgba(91,141,238,.15);color:var(--blue);border:1px solid rgba(91,141,238,.3)}
.pos-形容詞{background:rgba(232,184,75,.15);color:var(--accent);border:1px solid rgba(232,184,75,.3)}
.pos-副詞{background:rgba(240,96,96,.15);color:var(--red);border:1px solid rgba(240,96,96,.3)}
.pos-前置詞,pos-接続詞{background:rgba(180,96,240,.15);color:#c060f0;border:1px solid rgba(180,96,240,.3)}
.card-hint{font-size:.63rem;color:var(--muted);opacity:.55}

.back{display:none;width:100%;flex-direction:column;align-items:center;gap:6px}
.show-back .back{display:flex}
.show-back .card-hint{display:none}
.divider{width:100%;height:1px;background:var(--border)}
.card-meaning{font-size:clamp(.95rem,4.5vw,1.2rem);font-weight:700;color:var(--accent);line-height:1.4}
.card-ex-en{font-size:.72rem;color:var(--muted);font-style:italic;line-height:1.6;text-align:center}
.card-ex-en b{color:var(--blue);font-style:normal;font-weight:500}
.card-ex-ja{font-size:.68rem;color:var(--muted);line-height:1.6;text-align:center;opacity:.8}

.study-stats{display:flex;gap:6px}
.study-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px 8px;text-align:center}
.study-stat-n{font-size:1rem;font-weight:700;line-height:1}
.g{color:var(--green)}.r{color:var(--red)}.b{color:var(--blue)}
.study-stat-l{font-size:.58rem;color:var(--muted);margin-top:2px}

.actions{display:flex;gap:10px}
.btn-action{flex:1;padding:13px 8px;border:none;border-radius:13px;font-family:"Noto Sans JP",sans-serif;
  font-size:.85rem;font-weight:700;cursor:pointer}
.btn-action:active{opacity:.7;transform:scale(.96)}
.btn-bad{background:rgba(240,96,96,.12);border:1.5px solid rgba(240,96,96,.4);color:var(--red)}
.btn-good{background:rgba(62,207,142,.12);border:1.5px solid rgba(62,207,142,.4);color:var(--green)}
.btn-skip{flex:0 0 46px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-size:1.1rem}
.btn-home-mini{flex:0 0 46px;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-size:1rem}

/* ── 完了画面 ── */
#done{align-items:center;justify-content:center;gap:14px;padding:28px 24px;text-align:center}
.done-icon{font-size:3rem}
.done-title{font-family:"Playfair Display",serif;font-size:1.7rem;color:var(--accent)}
.done-sub{font-size:.83rem;color:var(--muted);line-height:1.7}
.done-stats-row{display:flex;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 28px}
.ds{text-align:center}.ds-n{font-size:1.5rem;font-weight:700}.ds-l{font-size:.65rem;color:var(--muted);margin-top:2px}
.btn-done{border-radius:13px;padding:13px 28px;font-family:"Noto Sans JP",sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;border:none}
.btn-done:active{opacity:.75}
.btn-done-primary{background:linear-gradient(135deg,var(--blue),var(--accent));color:#0d1117}
.btn-done-weak{background:transparent;color:var(--red);border:1.5px solid rgba(240,96,96,.4)!important;border:none}
.btn-done-home{background:var(--surface);color:var(--muted);border:1.5px solid var(--border)}

/* ── 統計画面 ── */
#stats-screen{padding:16px;gap:12px;overflow-y:auto}
.stats-header{display:flex;align-items:center;gap:10px}
.stats-back{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px}
.stats-ttl{font-family:"Playfair Display",serif;font-size:1.1rem;color:var(--accent)}
.stats-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px}
.stats-card-title{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.progress-label{font-size:.72rem;color:var(--muted);width:70px;flex-shrink:0}
.progress-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s}
.fill-green{background:var(--green)}.fill-red{background:var(--red)}.fill-blue{background:var(--blue)}
.progress-num{font-size:.7rem;color:var(--muted);width:36px;text-align:right;flex-shrink:0}
.weak-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.weak-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);
  border-radius:8px;padding:8px 10px}
.weak-word{font-family:"Playfair Display",serif;font-size:.95rem;font-weight:700;color:var(--text)}
.weak-meaning{font-size:.68rem;color:var(--muted)}
.weak-count{font-size:.72rem;color:var(--red);font-weight:700;flex-shrink:0}
.btn-clear{background:rgba(240,96,96,.1);border:1px solid rgba(240,96,96,.3);color:var(--red);
  border-radius:8px;padding:8px 14px;font-family:"Noto Sans JP",sans-serif;font-size:.75rem;
  cursor:pointer;margin-top:8px;width:100%}
.empty-msg{font-size:.78rem;color:var(--muted);text-align:center;padding:16px}
</style>
</head>
<body>

<!-- ── ホーム画面 ── -->
<div id="home" class="screen active">
  <div class="logo-area">
    <div class="logo">Vocab Flash</div>
    <div class="logo-sub">英単語 700語 フラッシュカード</div>
  </div>

  <div class="stats-banner">
    <div class="sstat"><div class="sstat-n gold" id="h-total">700</div><div class="sstat-l">総語数</div></div>
    <div class="sstat"><div class="sstat-n green" id="h-learned">0</div><div class="sstat-l">覚えた</div></div>
    <div class="sstat"><div class="sstat-n red" id="h-weak">0</div><div class="sstat-l">苦手語</div></div>
  </div>

  <div class="section-label">セクションで選ぶ</div>
  <div class="sec-grid">
    <button class="sec-btn on" id="sec-all" onclick="toggleSec(0)">全て</button>
    <button class="sec-btn" id="sec-1" onclick="toggleSec(1)">Sec 1</button>
    <button class="sec-btn" id="sec-2" onclick="toggleSec(2)">Sec 2</button>
    <button class="sec-btn" id="sec-3" onclick="toggleSec(3)">Sec 3</button>
    <button class="sec-btn" id="sec-4" onclick="toggleSec(4)">Sec 4</button>
    <button class="sec-btn" id="sec-5" onclick="toggleSec(5)">Sec 5</button>
    <button class="sec-btn" id="sec-6" onclick="toggleSec(6)">Sec 6</button>
    <button class="sec-btn" id="sec-7" onclick="toggleSec(7)">Sec 7</button>
  </div>

  <div class="section-label">番号で範囲指定</div>
  <div class="range-row">
    <input class="range-input" type="number" id="range-from" placeholder="1" min="1" max="700">
    <span class="range-sep">〜</span>
    <input class="range-input" type="number" id="range-to" placeholder="700" min="1" max="700">
  </div>

  <div class="start-btns">
    <button class="btn-start btn-primary" onclick="startStudy('normal')">▶ フラッシュカード学習を開始</button>
    <button class="btn-start btn-weak" id="btn-weak-start" onclick="startStudy('weak')">✗ 苦手単語を集中学習</button>
    <button class="btn-start btn-stats" onclick="showStats()">📊 学習統計・苦手リスト</button>
  </div>
</div>

<!-- ── 学習画面 ── -->
<div id="study" class="screen">
  <div class="study-header">
    <div class="study-title" id="study-title">通常学習</div>
    <div class="study-counter"><b id="cur">1</b> / <b id="tot">1</b></div>
  </div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>

  <div class="scene">
    <button id="card" onclick="flip()">
      <span class="card-sec" id="c-sec"></span>
      <span class="card-word" id="c-word"></span>
      <span class="card-pron" id="c-pron"></span>
      <span class="pos-badge" id="c-pos"></span>
      <span class="card-hint">タップして答えを見る 👆</span>
      <div class="back">
        <div class="divider"></div>
        <span class="card-meaning" id="c-meaning"></span>
        <div class="divider"></div>
        <span class="card-ex-en" id="c-ex-en"></span>
        <span class="card-ex-ja" id="c-ex-ja"></span>
      </div>
    </button>
  </div>

  <div class="study-stats">
    <div class="study-stat"><div class="study-stat-n g" id="s-good">0</div><div class="study-stat-l">✓ 覚えた</div></div>
    <div class="study-stat"><div class="study-stat-n r" id="s-bad">0</div><div class="study-stat-l">✗ もう一度</div></div>
    <div class="study-stat"><div class="study-stat-n b" id="s-left">0</div><div class="study-stat-l">残り</div></div>
  </div>

  <div class="actions">
    <button class="btn-action btn-bad"  onclick="answer(false)">✗ もう一度</button>
    <button class="btn-action btn-skip" onclick="nextCard()">→</button>
    <button class="btn-action btn-good" onclick="answer(true)">✓ 覚えた</button>
  </div>
  <button class="btn-action" style="background:none;border:none;color:var(--muted);font-size:.72rem;padding:4px;margin-top:-2px" onclick="confirmHome()">⏹ 中断してホームに戻る</button>
</div>

<!-- ── 完了画面 ── -->
<div id="done" class="screen">
  <div class="done-icon">🎉</div>
  <div class="done-title">セット完了！</div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-stats-row">
    <div class="ds"><div class="ds-n g" id="d-good">0</div><div class="ds-l">覚えた</div></div>
    <div class="ds"><div class="ds-n r" id="d-bad">0</div><div class="ds-l">もう一度</div></div>
  </div>
  <button class="btn-done btn-done-primary" onclick="restartSame()">🔄 同じ範囲をやり直す</button>
  <button class="btn-done btn-done-weak" id="done-weak-btn" onclick="startStudy('weak')" style="display:none"></button>
  <button class="btn-done btn-done-home" onclick="goHome()">🏠 ホームに戻る</button>
</div>

<!-- ── 統計画面 ── -->
<div id="stats-screen" class="screen">
  <div class="stats-header">
    <button class="stats-back" onclick="goHome()">←</button>
    <div class="stats-ttl">学習統計・苦手リスト</div>
  </div>

  <div class="stats-card">
    <div class="stats-card-title">セクション別 進捗</div>
    <div id="sec-progress"></div>
  </div>

  <div class="stats-card">
    <div class="stats-card-title">苦手単語リスト <span id="weak-count-label" style="color:var(--red)"></span></div>
    <div class="weak-list" id="weak-list"></div>
    <button class="btn-clear" onclick="clearWeak()">苦手リストをリセット</button>
  </div>
</div>

<script>

:"[dáiəlɔ̀g]","pos":"名詞","m":"対話、会話；対話【交渉】","e":"The dialogue between two characters represents a heated conflict.","j":"その劇の中での2人の登場人物の対話は激しい対立を表している。","s":7},{"no":677,"w":"component","p":"[kəmpóunənt]","pos":"名詞","m":"構成要素；部品","e":"Carbon is an essential component of all living cells.","j":"炭素はすべての生細胞の不可欠な構成要素である。","s":7},{"no":678,"w":"reputation","p":"[rèpjutéiʃən]","pos":"名詞","m":"評判；名声","e":"British food has a reputation for not being very tasty.","j":"イギリスの食べ物はあまりおいしくないという評判がある。","s":7},{"no":679,"w":"verbal","p":"[və́ːrbl]","pos":"形容詞","m":"口頭での；動詞の","e":"To receive verbal messages clearly you need good listening skills.","j":"口頭のメッセージをはっきりと受け取るためには、すぐれた傾聴力が必要である。","s":7},{"no":680,"w":"internal","p":"[intə́ːrnl]","pos":"形容詞","m":"内部の；国内の；内面的な","e":"Some Japanese firms are making their internal office language English.","j":"日本のある企業は内部での社内語を英語にしつつある。","s":7},{"no":681,"w":"solid","p":"[sɔ́lid]","pos":"形容詞","m":"しっかりした；固体；固形物","e":"At present we have no solid evidence of life on other planets.","j":"現在、私たちは他の惑星上の生命のしっかりした証拠を持っていない。","s":7},{"no":682,"w":"remote","p":"[rimóut]","pos":"形容詞","m":"(〜から)遠く離れた；遠い","e":"My hometown lies remote from cities.","j":"私の故郷は都市から遠く離れている。","s":7},{"no":683,"w":"principal","p":"[prínsəpl]","pos":"形容詞","m":"主要な；資本金；当事者","e":"Computer programming is his principal source of income.","j":"コンピュータプログラミングが彼の主要な収入源である。","s":7},{"no":684,"w":"sophisticated","p":"[səlístiкèitid]","pos":"形容詞","m":"高性能の；精巧な；洗練された","e":"There is a huge demand for sophisticated translation software.","j":"高性能な翻訳ソフトウェアへの大きな需要がある。","s":7},{"no":685,"w":"equivalent","p":"[ikwívələnt]","pos":"形容詞","m":"等しい；相当する；同等のもの","e":"The price of this painting is equivalent to a month's salary.","j":"この絵画の値段は彼の月収に相当する。","s":7},{"no":686,"w":"rational","p":"[rǽʃənl]","pos":"形容詞","m":"理性的な；合理的な","e":"In decision-making we should use the rational part of the mind.","j":"意思決定において私たちは精神の理性的な部分を使うべきである。","s":7},{"no":687,"w":"relevant","p":"[rélivənt]","pos":"形容詞","m":"関係がある；(〜と)関連している","e":"Police are collecting relevant information for solving the case.","j":"警察はその事件を解決するための関連情報を収集している。","s":7},{"no":688,"w":"absolute","p":"[ǽbsəluːt]","pos":"形容詞","m":"絶対的な；(否定文)まったくその","e":"It is an absolute necessity for people living in the countryside.","j":"それは田舎に住む人々にとって絶対的な必需品である。","s":7},{"no":689,"w":"frequent","p":"[fríːkwənt]","pos":"形容詞","m":"繰繁な；頻繁に；頻度","e":"Human brains seem to be changing due to the frequent use of the Internet.","j":"人間の脳はインターネットの繁繁な使用のせいで変化しているように思える。","s":7},{"no":690,"w":"permanent","p":"[pə́ːrmənənt]","pos":"形容詞","m":"永続的な；永久に；いつも","e":"The accident caused permanent damage to the man's back.","j":"その事故はその男性の背中に永続的な損傷を与えた。","s":7},{"no":691,"w":"intense","p":"[inténs]","pos":"形容詞","m":"強烈な；熱烈な","e":"Fear is such an intense emotion that it can feel your heart pumping fast.","j":"恐怖はとても強烈な感情なので、自分の心臓が速く動くのを感じることができる。","s":7},{"no":692,"w":"meaningful","p":"[míːniŋfl]","pos":"形容詞","m":"意味のある；重要な","e":"He started doing volunteer activities to make his life more meaningful.","j":"彼は人生をより意味のあるものにするためにボランティア活動を始めた。","s":7},{"no":693,"w":"evil","p":"[íːvl]","pos":"形容詞","m":"邪悪な；有害な","e":"He believes that no one would willingly commit an evil act.","j":"だれも進んで邪悪な行為をすることはないだろうと彼は信じている。","s":7},{"no":694,"w":"extinct","p":"[ikstíŋkt]","pos":"形容詞","m":"絶滅した；廃止された","e":"Every year an increasing number of animals are becoming extinct.","j":"毎年ますます多くの動物が絶滅しつつある。","s":7},{"no":695,"w":"random","p":"[rǽndəm]","pos":"形容詞","m":"無作為の；手当り次第の","e":"The research team collects their samples using random selection.","j":"その研究チームは無作為選出を使ってサンプルを集める。","s":7},{"no":696,"w":"raw","p":"[rɔ́ː]","pos":"形容詞","m":"生の；未加工(原材料)","e":"He has never eaten raw fish.","j":"彼は一度も生魚を食べたことがない。","s":7},{"no":697,"w":"rude","p":"[rúːd]","pos":"形容詞","m":"無礼な；礼儀正しくない","e":"To talk without making any eye contact is a rude behavior.","j":"アイコンタクトをまったくせずに話すことは礼儀のない行動である。","s":7},{"no":698,"w":"mere","p":"[míər]","pos":"形容詞","m":"単なる；ほんの(≒ only)","e":"He is a mere child so he said some silly things.","j":"彼はほんの子供なので、彼は何をもいつまらないことを言った。","s":7},{"no":699,"w":"tropical","p":"[trɔ́pikəl]","pos":"形容詞","m":"熱帯の；熱帯地方","e":"She was born and brought up in a tropical country.","j":"彼女は熱帯の国で生まれ育った。","s":7},{"no":700,"w":"forth","p":"[fɔːrθ]","pos":"副詞","m":"前へ；先へ；(副詞に)今後に","e":"When you read your eyes move back and forth across a sentence.","j":"本を読むとき、目を文面の上を前後に動かす。","s":7}];

// ── localStorage ──
const LS_LEARNED = "vf_learned"; // Set of nos learned
const LS_WEAK    = "vf_weak";    // Map of no -> count

function loadLearned(){ try{ return new Set(JSON.parse(localStorage.getItem(LS_LEARNED)||"[]")); }catch{return new Set()} }
function saveLearned(s){ localStorage.setItem(LS_LEARNED, JSON.stringify([...s])); }
function loadWeak(){ try{ return new Map(Object.entries(JSON.parse(localStorage.getItem(LS_WEAK)||"{}"))); }catch{return new Map()} }
function saveWeak(m){ const o={}; m.forEach((v,k)=>o[k]=v); localStorage.setItem(LS_WEAK, JSON.stringify(o)); }

let learned = loadLearned();
let weakMap = loadWeak();

// ── 状態 ──
let deck=[], idx=0, goodSet=new Set(), badSet=new Set();
let mode="normal"; // normal | weak
let selectedSec=0; // 0=all

// ── ホーム更新 ──
function updateHome(){
  document.getElementById("h-learned").textContent = learned.size;
  document.getElementById("h-weak").textContent = weakMap.size;
  const wb = document.getElementById("btn-weak-start");
  wb.disabled = weakMap.size === 0;
  wb.textContent = weakMap.size > 0 ? `✗ 苦手単語を集中学習 (${weakMap.size}語)` : "✗ 苦手単語なし";
}

// ── セクション選択 ──
function toggleSec(n){
  selectedSec = n;
  document.querySelectorAll(".sec-btn").forEach(b => b.classList.remove("on"));
  document.getElementById(n===0 ? "sec-all" : "sec-"+n).classList.add("on");
  // 範囲入力クリア
  document.getElementById("range-from").value = "";
  document.getElementById("range-to").value = "";
}

// ── デッキ構築 ──
function buildDeck(m){
  mode = m;
  const from = parseInt(document.getElementById("range-from").value) || 1;
  const to   = parseInt(document.getElementById("range-to").value)   || 700;

  let pool;
  if(m === "weak"){
    const nos = [...weakMap.keys()].map(Number);
    pool = VOCAB.filter(v => nos.includes(v.no));
  } else {
    pool = VOCAB.filter(v => {
      const inSec   = selectedSec === 0 || v.s === selectedSec;
      const inRange = v.no >= from && v.no <= to;
      return inSec && inRange;
    });
  }
  // シャッフル
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  return pool;
}

// ── 学習開始 ──
function startStudy(m){
  deck = buildDeck(m);
  if(deck.length === 0){ alert("該当する単語がありません"); return; }
  idx=0; goodSet=new Set(); badSet=new Set();
  document.getElementById("study-title").textContent =
    m==="weak" ? `苦手集中 (${deck.length}語)` :
    selectedSec > 0 ? `Section ${selectedSec}` :
    `通常学習 (${deck.length}語)`;
  showScreen("study");
  render();
}

// ── 画面切り替え ──
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goHome(){ updateHome(); showScreen("home"); }

// ── カード描画 ──
function render(){
  if(!deck[idx]) return;
  const v = deck[idx];
  document.getElementById("card").classList.remove("show-back");
  document.getElementById("c-sec").textContent   = `Section ${v.s}  No.${v.no}`;
  document.getElementById("c-word").textContent  = v.w;
  document.getElementById("c-pron").textContent  = v.p;
  const pb = document.getElementById("c-pos");
  pb.textContent = v.pos; pb.className = "pos-badge pos-"+v.pos;
  document.getElementById("c-meaning").textContent = v.m;
  // 英文例の単語をハイライト
  const word = v.w;
  const re = new RegExp("(\\b"+word+"[a-z]*)","gi");
  document.getElementById("c-ex-en").innerHTML = v.e.replace(re,"<b>$1</b>");
  document.getElementById("c-ex-ja").textContent = v.j;

  const done=goodSet.size+badSet.size, total=deck.length;
  document.getElementById("prog").style.width = (done/total*100)+"%";
  document.getElementById("cur").textContent  = idx+1;
  document.getElementById("tot").textContent  = total;
  document.getElementById("s-good").textContent = goodSet.size;
  document.getElementById("s-bad").textContent  = badSet.size;
  document.getElementById("s-left").textContent = total-done;
}

function flip(){ document.getElementById("card").classList.toggle("show-back"); }

function answer(good){
  const card=document.getElementById("card");
  if(!card.classList.contains("show-back")){ card.classList.add("show-back"); return; }
  const v = deck[idx];
  if(good){
    goodSet.add(v.no);
    learned.add(v.no);
    // 苦手リストから回数減算（3回正解で除外）
    if(weakMap.has(String(v.no))){
      const cnt = weakMap.get(String(v.no)) - 1;
      if(cnt <= 0) weakMap.delete(String(v.no));
      else weakMap.set(String(v.no), cnt);
      saveWeak(weakMap);
    }
  } else {
    badSet.add(v.no);
    // 苦手リストに追加（カウントアップ）
    const key = String(v.no);
    weakMap.set(key, (weakMap.get(key)||0)+1);
    saveWeak(weakMap);
  }
  saveLearned(learned);
  nextCard();
}

function nextCard(){
  idx++;
  if(idx >= deck.length){ showDone(); return; }
  render();
}

// ── 完了 ──
function showDone(){
  document.getElementById("d-good").textContent = goodSet.size;
  document.getElementById("d-bad").textContent  = badSet.size;
  const pct = deck.length>0 ? Math.round(goodSet.size/deck.length*100) : 0;
  document.getElementById("done-sub").textContent = `全 ${deck.length} 語完了！正解率 ${pct}%`;
  const wb = document.getElementById("done-weak-btn");
  if(badSet.size > 0){
    wb.style.display="block";
    wb.textContent=`✗ このセットの苦手 ${badSet.size}語 を復習`;
    wb.className="btn-done btn-done-weak";
  } else { wb.style.display="none"; }
  showScreen("done");
}

function restartSame(){ startStudy(mode); }

// ── 統計画面 ──
function showStats(){
  // セクション別進捗
  const secEl = document.getElementById("sec-progress");
  secEl.innerHTML = "";
  for(let s=1;s<=7;s++){
    const total = VOCAB.filter(v=>v.s===s).length;
    const done  = VOCAB.filter(v=>v.s===s && learned.has(v.no)).length;
    const weak  = VOCAB.filter(v=>v.s===s && weakMap.has(String(v.no))).length;
    const pct   = Math.round(done/total*100);
    secEl.innerHTML += `
      <div class="progress-row">
        <span class="progress-label">Section ${s}</span>
        <div class="progress-bar-wrap"><div class="progress-fill fill-green" style="width:${pct}%"></div></div>
        <span class="progress-num">${done}/${total}</span>
      </div>`;
  }

  // 苦手リスト
  const listEl = document.getElementById("weak-list");
  document.getElementById("weak-count-label").textContent = weakMap.size > 0 ? `(${weakMap.size}語)` : "";
  listEl.innerHTML = "";
  if(weakMap.size === 0){
    listEl.innerHTML = '<div class="empty-msg">苦手単語はありません 🎉</div>';
  } else {
    // 回数が多い順にソート
    const sorted = [...weakMap.entries()].sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([no, cnt])=>{
      const v = VOCAB.find(x=>x.no===Number(no));
      if(!v) return;
      listEl.innerHTML += `
        <div class="weak-item">
          <div>
            <div class="weak-word">${v.w}</div>
            <div class="weak-meaning">${v.m}</div>
          </div>
          <div class="weak-count">✗ ${cnt}回</div>
        </div>`;
    });
  }
  showScreen("stats-screen");
}

function clearWeak(){
  if(!confirm("苦手リストをリセットしますか？")) return;
  weakMap.clear(); saveWeak(weakMap);
  showStats();
  updateHome();
}

function confirmHome(){
  if(goodSet.size+badSet.size === 0 || confirm(`${goodSet.size+badSet.size}語まで進んでいます。\n中断してホームに戻りますか？`)){
    goHome();
  }
}

// ── 初期化 ──
updateHome();
</script>
